[package]
name = "alloy-os-terminal"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "alloy-terminal"
path = "src/main.rs"

[dependencies]
ratatui = "0.26"
crossterm = "0.27"
tokio = { version = "1", features = ["full"] }
tui-logger = "0.8"
chrono = "0.4"
serde = { version = "1.0", features = ["derive"], optional = true }
serde_json = { version = "1.0", optional = true }

[dev-dependencies]
